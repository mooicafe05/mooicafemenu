<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menümüz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f8f5f2;
color:#333;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('./image/main-banner.jpg');
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:38px;
font-weight:700;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* CATEGORY SECTION */
.categories{
padding:50px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-decoration:none;
color:#333;
transition:0.4s;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:center;
}

.card h3{
font-size:18px;
font-weight:600;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
font-size:14px;
background:#4b2e2e;
color:white;
margin-top:40px;
}

/* MOBILE */
@media(max-width:600px){
.hero h1{font-size:28px;}
}
.vefa-bant {
    width: 100%;
    padding: 28px 15px;
    text-align: center;
    background-color: #f8f8f8;
    border-top: 1px solid #e5e5e5;
}

.vefa-bant p {
    margin: 0;
    font-size: 15px;
    color: #333;
    font-weight: 500;
    letter-spacing: 0.3px;
    line-height: 1.6;
}

/* Mobil */
@media (max-width: 768px) {
    .vefa-bant {
        padding: 22px 12px;
    }

    .vefa-bant p {
        font-size: 14px;
    }
}

</style>
</head>
<body>

<section class="hero">
<h1>MENÜ</h1>
<p>Lezzetin En Tatlı Hali 🍰</p>
</section>

<section class="categories">

<a href="tatlilar.html" class="card">
<img src="./image/waffle.jpg" alt="Tatlılar">
<div class="card-content">
<h3>Tatlılar</h3>
</div>
</a>

<a href="kahveler.html" class="card">
<img src="./image/kahve-banner.jfif" alt="Kahveler">
<div class="card-content">
<h3>Kahveler</h3>
</div>
</a>

<a href="caylar.html" class="card">
<img src="./image/cay-banner.jfif" alt="Çaylar">
<div class="card-content">
<h3>Çaylar</h3>
</div>
</a>

<a href="fresh.html" class="card">
<img src="./image/fresh-banner.jpg" alt="Soğuk İçecekler">
<div class="card-content">
<h3>Fresh & Soğuk İçecekler</h3>
</div>
</a>

</section>
<div class="vefa-bant">
    <p>
        Şehit aileleri ve özel çocuklarımıza tüm ürünlerimiz ikramımızdır.
    </p>
</div>
<footer>
© 2026 Mooi Cafe | Tüm Hakları Saklıdır
</footer>

</body>
</html>
